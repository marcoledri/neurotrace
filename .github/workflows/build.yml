name: Build installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14       # Apple Silicon runner
            arch: arm64
            artifact: NeuroTrace-mac-arm64
            builder_flags: --mac dmg --arm64
            freeze: bash scripts/build-backend.sh
          # Intel Mac build intentionally disabled for the 0.2.x series —
          # the lab only uses Apple Silicon. Re-add the macos-13 row here
          # if an Intel artefact is ever needed again.
          - os: windows-latest
            arch: x64
            artifact: NeuroTrace-win-x64
            builder_flags: --win nsis --x64
            freeze: pwsh scripts/build-backend.ps1
          - os: ubuntu-latest
            arch: x64
            artifact: NeuroTrace-linux-x64
            builder_flags: --linux AppImage --x64
            freeze: bash scripts/build-backend.sh

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Install Node deps
        run: npm ci

      - name: Freeze backend
        run: ${{ matrix.freeze }}

      - name: Build frontend + installer
        env:
          # electron-builder picks this up to skip code-signing on CI
          # (colleagues get an unsigned installer — fine for lab testing)
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          npx tsc
          npx vite build
          npx electron-builder ${{ matrix.builder_flags }} --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.blockmap
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
